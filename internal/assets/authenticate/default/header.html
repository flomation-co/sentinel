<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Flomation | Automate your world</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta content="Flomation Limited" name="author" />
    <meta name="msapplication-TileColor" content="#5C2482">
    <meta name="theme-color" content="#0d0912">

    <meta content="Flomation - Automate your world" property="og:title"/>
    <meta content="" property="og:description"/>
    <meta name="description" content="">

    <meta name="twitter:title" content="Flomation - Automate your world"/>
    <meta name="twitter:description" content=""/>
    <meta name="twitter:image" content=""/>
    <meta name="twitter:card" content="summary_large_image"/>

    <meta property="og:title" content="Flomation - Automate your world"/>
    <meta property="og:description" content=""/>
    <meta property="og:url" content="{{ .Domain }}"/>
    <meta property="og:image:secure_url" content=""/>
    <meta name="image" property="og:image" content=""/>
    <meta property="og:image:width" content="1200"/>
    <meta property="og:image:height" content="630"/>

    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon.png">
    <link rel="mask-icon" href="assets/images/favicon.png" color="#5bbad5">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --background-colour: #0d0912;
            --primary-foreground: #460070;
            --primary-background: #33263a;
            --primary-background-muted: #18121c;
            --secondary-background: #00aa9c;
            --primary-font-colour: #fff;
            --secondary-font-colour: #ae9fb9;
            --secondary-action-colour: #0a0;
            --highlight-colour: #48abe0;
            --card-bg: linear-gradient(180deg, rgba(70, 0, 112, 0.15) 0%, rgba(30, 20, 40, 0.9) 100%);
            --card-border: rgba(174, 159, 185, 0.2);
            --input-bg: rgba(24, 18, 28, 0.8);
            --input-border: rgba(174, 159, 185, 0.15);
            --input-focus-border: rgba(70, 0, 112, 0.6);
        }

        * {
            box-sizing: border-box;
        }

        html {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }

        body {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 0.95em;
            color: var(--primary-font-colour);
            background: radial-gradient(ellipse at top left, #1a0a24 0%, #0d0912 50%, #060409 100%);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .authenticate_container_full {
            width: 100%;
        }

        .authenticate_container_small {
            width: 100%;
            max-width: 460px;
        }

        .authenticate_container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 16px;
            overflow: hidden;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: 0 24px 80px rgba(70, 0, 112, 0.3), 0 0 0 1px rgba(70, 0, 112, 0.1);
        }

        .identity-container {
            box-sizing: border-box;
        }

        .authenticate_header {
            text-align: center;
            padding: 32px 32px 24px;
            border-bottom: 1px solid rgba(174, 159, 185, 0.1);
        }

        .authenticate_content {
            padding: 32px;
            color: var(--primary-font-colour);
            font-size: 14px;
            line-height: 1.6;
        }

        .button {
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: 0;
            margin-top: 10px;
            margin-bottom: 5px;
            box-sizing: border-box;
            display: inline-block;
            font-family: 'Inter', sans-serif;
            appearance: none;
            width: 100%;
            text-align: center;
            transition: all 0.2s ease;
            letter-spacing: 0.01em;
        }

        .button-continue {
            background: linear-gradient(135deg, #460070, #5a0090);
            color: #fff;
            box-shadow: 0 4px 16px rgba(70, 0, 112, 0.4);
        }

        .button-continue:hover {
            background: linear-gradient(135deg, #520080, #6a00a8);
            box-shadow: 0 6px 24px rgba(70, 0, 112, 0.5);
            transform: translateY(-1px);
        }

        .button-continue:active {
            transform: translateY(0);
        }

        .button-back {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(174, 159, 185, 0.2);
        }

        .button-back:hover {
            background: rgba(174, 159, 185, 0.08);
            color: rgba(255, 255, 255, 0.8);
        }

        input[type="email"],
        input[type="password"],
        input[type="text"]:not(.input_mfa_single) {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--input-bg);
            color: var(--primary-font-colour);
            outline: none;
            border: 1px solid var(--input-border);
            border-radius: 10px;
            box-sizing: border-box;
            margin-top: 16px;
            margin-bottom: 16px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:not(.input_mfa_single):focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px rgba(70, 0, 112, 0.2);
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder,
        input[type="text"]::placeholder {
            color: rgba(174, 159, 185, 0.5);
        }

        input[type="hidden"] {
            display: none;
        }

        input[type="submit"],
        input[type="button"] {
            padding: 14px 24px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: 0;
            margin-top: 10px;
            margin-bottom: 5px;
            box-sizing: border-box;
            display: inline-block;
            font-family: 'Inter', sans-serif;
            appearance: none;
            width: 100%;
            text-align: center;
            transition: all 0.2s ease;
        }

        .input_bg {
            cursor: auto;
        }

        .input_mfa {
            height: auto;
            aspect-ratio: 1;
            border: 2px solid rgba(70, 0, 112, 0.4);
            margin: 5px;
            text-align: center;
            font-size: 3em;
            border-radius: 8px;
        }

        .mfa_container {
            display: flex;
            justify-content: center;
            margin-top: 24px;
            margin-bottom: 24px;
        }

        .input_mfa_single {
            width: 100%;
            max-width: 220px;
            height: 56px;
            text-align: center;
            font-size: 2em;
            font-family: 'Courier New', monospace;
            letter-spacing: 0.4em;
            border: 2px solid rgba(70, 0, 112, 0.4);
            border-radius: 10px;
            margin: 0;
            background-color: var(--input-bg);
            color: var(--primary-font-colour);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            padding: 10px;
        }

        .input_mfa_single:focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 3px rgba(70, 0, 112, 0.2);
        }

        .center-image {
            text-align: center;
        }

        .center-image img {
            border-radius: 12px;
            margin-top: 8px;
        }

        hr {
            margin-top: 15px;
            margin-bottom: 15px;
            border: none;
            border-top: 1px solid rgba(174, 159, 185, 0.1);
        }

        .error {
            color: #f87171;
            font-weight: 600;
            font-size: 13px;
            margin-top: 8px;
            margin-bottom: 12px;
            padding: 10px 14px;
            background: rgba(248, 113, 113, 0.08);
            border-radius: 8px;
            border: 1px solid rgba(248, 113, 113, 0.15);
        }

        .password-reset-link {
            color: var(--secondary-font-colour);
            text-decoration: none;
            cursor: pointer;
            font-size: 13px;
            transition: color 0.2s ease;
        }

        .password-reset-link:hover {
            color: var(--secondary-background);
            text-decoration: underline;
        }

        .invalid {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin: 4px 0;
            padding-left: 24px;
            position: relative;
        }

        .invalid:before {
            content: "\2715";
            width: 16px;
            display: inline-block;
            position: absolute;
            left: 0;
            color: rgba(248, 113, 113, 0.7);
            font-size: 12px;
        }

        .valid {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            margin: 4px 0;
            padding-left: 24px;
            position: relative;
        }

        .valid:before {
            content: "\2713";
            width: 16px;
            display: inline-block;
            position: absolute;
            left: 0;
            color: #4ade80;
            font-size: 12px;
        }

        .strong {
            font-weight: 700;
            color: var(--secondary-background);
        }

        @media only screen and (max-width: 576px) {
            .authenticate_container_small {
                width: calc(100% - 40px);
                max-width: none;
            }
        }

        .footer-links {
            padding: 16px 32px;
            border-top: 1px solid rgba(174, 159, 185, 0.1);
            text-align: center;
        }

        ul {
            width: 100%;
            text-align: center;
            padding: 0;
            margin: 0;
        }

        li {
            display: inline-block;
            min-width: auto;
            margin: 0 12px;
        }

        li > a {
            color: rgba(255, 255, 255, 0.3);
            display: inline-block;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.2s ease;
        }

        li > a:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        .pc50 {
            width: 100%;
            display: block;
            margin: 0;
        }

        .continue_creating_title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .continue_creating {
            margin-bottom: 16px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
        }

        p {
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <div class="authenticate_container authenticate_container_small" id="authenticate_container">
        <div class="authenticate_header">
            <a href="/authenticate" title="Log In or Sign Up for Flomation" data-lang="sign_up_message">
                <img width="180" height="auto" src="assets/images/flomation-logo.png" alt="Flomation | Automate your world">
            </a>
        </div>
        <div class="authenticate_content" id="authenticate_content">
        <form method="post" action="" name="form" id="form">
            <input type="hidden" id="iframe" maxlength="255" name="iframe" />
            <input type="hidden" id="session" maxlength="255" name="session" value="$$SESSION_ID$$" />
