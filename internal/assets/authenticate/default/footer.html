            </form>

    <script>
        const state = document.getElementById("iframe");
        const isIframe = (window.location !== window.parent.location);
        state.value = isIframe

        const container = document.getElementById("authenticate_container");

        if (container && isIframe) {
            document.body.style.background = "transparent"
            container.classList.remove("authenticate_container_small");
            container.classList.add("authenticate_container_full");
        }

        function updateParentSize() {
            if (parent) {
                parent.postMessage({
                    state: "resize",
                    width: container.offsetWidth,
                    height: container.offsetHeight
                }, "*");
            }
        }

        if (isIframe) {
            updateParentSize();

            new ResizeObserver(updateParentSize).observe(container);
        }
    </script>
