<div data-lang="password_reset" class="subtitle" style="margin-bottom: 8px;">
    To continue resetting your password, click continue. You will be sent an email with instructions.
</div>
<div>
    <input type="hidden" name="form_state" id="form_state" maxlength="255" value="submit_forgot_password"/>
    <div>
        <input type="submit" value="Reset password" data-lang="password_reset" class="button button-continue" onclick="if (form.checkValidity()) {this.form.submit();}"/>
    </div>
    <div>
        <div class="button button-back" onclick="history.back()">&#8592; Back</div>
    </div>
</div>
