
<div class="center-image">
    <img src="/mfa/qr" alt="Enrol MFA"/>
</div>
<p>
    Open your authenticator app, and scan the QR Code above.

    Enter the MFA code provided and click "Enrol MFA" to complete enrolment.
</p>
<div class="mfa_container">
    <div class="mfa_boxes">
        <div class="mfa_box"></div>
        <div class="mfa_box"></div>
        <div class="mfa_box"></div>
        <div class="mfa_box"></div>
        <div class="mfa_box"></div>
        <div class="mfa_box"></div>
        <input type="text" name="mfa_code" id="mfa_code" required maxlength="6" minlength="6"
               pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"
               class="input_mfa_single" autofocus
               oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
    </div>
</div>

<div>
    <input type="submit" value="Enrol MFA" data-lang="enrol_mfa" class="button button-continue"/>
</div>
