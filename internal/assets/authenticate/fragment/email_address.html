<div class="identity-container">
    <div data-lang="enter_email_address">
        Enter your email address to get started
    </div>
    <input type="hidden" name="form_state" id="form_state" maxlength="255" value="email_address"/>
    <input type="email" name="email_address" id="email_address" required maxlength="255" placeholder="Email Address" data-lang="email_address" class="input_bg" autofocus/>
    <div>
        <input type="submit" value="Continue" data-lang="continue" class="button button-continue" onclick="if (form.checkValidity()) {this.form.submit();}"/>
    </div>
</div>
