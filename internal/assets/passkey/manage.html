<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passkeys — Flomation</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #161019;
            --card-bg: rgba(255,255,255,0.03);
            --card-border: rgba(255,255,255,0.06);
            --accent: #00aa9c;
            --accent-hover: #00ccbb;
            --text: rgba(255,255,255,0.85);
            --text-muted: rgba(255,255,255,0.4);
            --danger: rgba(248,113,113,0.8);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
        .subtitle { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
        .btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 10px 18px; border-radius: 8px; border: none;
            font-size: 14px; font-weight: 500; font-family: inherit;
            cursor: pointer; transition: all 0.15s ease;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn-danger {
            background: rgba(248,113,113,0.08); color: var(--danger);
            border: 1px solid rgba(248,113,113,0.15); padding: 6px 12px; font-size: 12px;
        }
        .btn-danger:hover { background: rgba(248,113,113,0.15); }
        .btn-back {
            background: rgba(255,255,255,0.05); color: var(--text-muted);
            border: 1px solid var(--card-border); font-size: 13px;
        }
        .btn-back:hover { background: rgba(255,255,255,0.08); color: var(--text); }
        .cred-list { display: flex; flex-direction: column; gap: 8px; margin: 20px 0; }
        .cred-card {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 16px; background: var(--card-bg);
            border: 1px solid var(--card-border); border-radius: 10px;
        }
        .cred-icon {
            width: 36px; height: 36px; border-radius: 8px;
            background: rgba(0,170,156,0.12); color: var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; flex-shrink: 0;
        }
        .cred-info { flex: 1; min-width: 0; }
        .cred-name { font-size: 14px; font-weight: 500; }
        .cred-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .empty { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 14px; }
        #status { margin: 12px 0; font-size: 13px; }
        .status-ok { color: var(--accent); }
        .status-err { color: var(--danger); }
        .actions { display: flex; gap: 10px; margin-top: 24px; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="container">
    <h1>Passkeys</h1>
    <p class="subtitle">Sign in with your fingerprint, face, or security key. Passkeys are phishing-resistant and don't require a password.</p>

    <button class="btn btn-primary" id="add-btn" onclick="registerPasskey()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add passkey
    </button>

    <div id="status"></div>

    <div class="cred-list" id="cred-list"></div>

    <div class="actions">
        <a href="/mfa" class="btn btn-back">MFA Settings</a>
    </div>
</div>

<script>
var credentials = $$CREDENTIALS$$;

function renderCredentials() {
    var list = document.getElementById('cred-list');
    if (!credentials || credentials.length === 0) {
        list.innerHTML = '<div class="empty">No passkeys registered yet.</div>';
        return;
    }
    list.innerHTML = credentials.map(function(c) {
        return '<div class="cred-card">' +
            '<div class="cred-icon">' +
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2"/><circle cx="12" cy="16" r="1"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>' +
            '</div>' +
            '<div class="cred-info">' +
                '<div class="cred-name">' + escapeHtml(c.name) + '</div>' +
                '<div class="cred-meta">Added ' + c.created_at + ' &middot; Last used: ' + c.last_used + '</div>' +
            '</div>' +
            '<button class="btn btn-danger" onclick="deletePasskey(\'' + c.id + '\')">Remove</button>' +
        '</div>';
    }).join('');
}

function escapeHtml(s) {
    var d = document.createElement('div');
    d.appendChild(document.createTextNode(s));
    return d.innerHTML;
}

function setStatus(msg, isError) {
    var el = document.getElementById('status');
    el.textContent = msg;
    el.className = isError ? 'status-err' : 'status-ok';
}

function registerPasskey() {
    setStatus('Starting registration\u2026', false);

    fetch('/webauthn/register/begin', { method: 'POST', credentials: 'same-origin' })
    .then(function(r) { return r.json(); })
    .then(function(options) {
        options.publicKey.challenge = base64urlToBuffer(options.publicKey.challenge);
        options.publicKey.user.id = base64urlToBuffer(options.publicKey.user.id);
        if (options.publicKey.excludeCredentials) {
            options.publicKey.excludeCredentials.forEach(function(c) { c.id = base64urlToBuffer(c.id); });
        }
        setStatus('Complete the biometric prompt\u2026', false);
        return navigator.credentials.create({ publicKey: options.publicKey });
    })
    .then(function(cred) {
        setStatus('Saving\u2026', false);
        var body = {
            id: cred.id,
            rawId: bufferToBase64url(cred.rawId),
            type: cred.type,
            response: {
                attestationObject: bufferToBase64url(cred.response.attestationObject),
                clientDataJSON: bufferToBase64url(cred.response.clientDataJSON)
            }
        };
        return fetch('/webauthn/register/finish', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify(body)
        });
    })
    .then(function(r) { return r.json(); })
    .then(function(result) {
        if (result.error) throw new Error(result.error);
        setStatus('Passkey "' + result.name + '" registered successfully.', false);
        setTimeout(function() { window.location.reload(); }, 1000);
    })
    .catch(function(err) {
        if (err.name === 'AbortError' || err.name === 'NotAllowedError') {
            setStatus('Registration cancelled.', true);
        } else {
            setStatus(err.message || 'Registration failed.', true);
        }
    });
}

function deletePasskey(id) {
    if (!confirm('Remove this passkey? You will no longer be able to sign in with it.')) return;

    fetch('/webauthn/credential/' + id, { method: 'DELETE', credentials: 'same-origin' })
    .then(function(r) { return r.json(); })
    .then(function(result) {
        if (result.error) throw new Error(result.error);
        credentials = credentials.filter(function(c) { return c.id !== id; });
        renderCredentials();
        setStatus('Passkey removed.', false);
    })
    .catch(function(err) {
        setStatus(err.message || 'Unable to remove passkey.', true);
    });
}

function base64urlToBuffer(b64) {
    var base64 = b64.replace(/-/g, '+').replace(/_/g, '/');
    while (base64.length % 4) base64 += '=';
    var bin = atob(base64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes.buffer;
}

function bufferToBase64url(buf) {
    var bytes = new Uint8Array(buf);
    var bin = '';
    for (var i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

renderCredentials();
</script>
</body>
</html>
